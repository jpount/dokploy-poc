server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # Proxy API calls to the api service so the browser
    # never needs to know the API's address directly
    location /api/ {
        proxy_pass http://api:3001;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://api:3001/health;
    }
}
